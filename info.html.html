<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🎟️ Event Booking System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>🎟️ Event Booking System</h1>

  <section id="events">
    <h2>Available Events</h2>
    <div id="event-list"></div>
  </section>

  <section id="book">
    <h2>Book an Event</h2>
    <form id="bookingForm">
      <input type="text" id="userName" placeholder="Your Name" required />
      <input type="number" id="eventId" placeholder="Event ID" required />
      <button type="submit">Book Now</button>
    </form>
  </section>

  <section id="bookings">
    <h2>All Bookings</h2>
    <div id="booking-list"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>

<section id="search">
  <h2>Search Events</h2>
  <input type="text" id="searchInput" placeholder="Search by name or date">
  <button id="searchBtn">Search</button>
  <div id="search-results"></div>
</section>

<section id="admin">
  <h2>Admin Panel</h2>
  <form id="addEventForm">
    <input type="text" id="eventName" placeholder="Event Name" required>
    <input type="date" id="eventDate" required>
    <input type="number" id="eventSeats" placeholder="Seats" required>
    <button type="submit">Add Event</button>
  </form>
</section>

<div id="messageBox"></div>
